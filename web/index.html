<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amharic-English AI Translator</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="/static/style.css?v=2.0">
</head>

<body>
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m5 8 6 6 6-6" />
                        <path d="M4 14h16" />
                        <path d="M2 5h20" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Amharic <span class="accent-text">NMT</span></h1>
                    <span class="sub-badge">PyTorch Transformer-Base</span>
                </div>
            </div>

            <div class="system-status" id="systemStatus">
                <span class="status-dot pulsing"></span>
                <span class="status-text" id="statusText">Connecting to API...</span>
            </div>
        </header>

        <!-- Main Translation Workspace -->
        <main class="translator-card">
            <!-- Language Selector Bar -->
            <div class="lang-bar">
                <div class="lang-pill active">
                    <span class="lang-flag">🇪🇹</span>
                    <span class="lang-name">Amharic (አማርኛ)</span>
                </div>
                <div class="arrow-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
                <div class="lang-pill active">
                    <span class="lang-flag">🇺🇸</span>
                    <span class="lang-name">English</span>
                </div>
            </div>

            <!-- Translation Boxes Grid -->
            <div class="translation-grid">
                <!-- Source Box (Amharic Input) -->
                <div class="box-container source-box">
                    <div class="box-header">
                        <span class="box-label">Input Text (Amharic)</span>
                        <button class="btn-text" id="btnClear" title="Clear text">Clear</button>
                    </div>
                    <textarea id="srcInput" class="text-input"
                        placeholder="በአማርኛ ጻፍ (e.g., አዲስ አበባ የኢትዮጵያ ዋና ከተማ ናት።)..." maxlength="512" rows="6"
                        autofocus></textarea>
                    <div class="box-footer">
                        <span class="char-counter"><span id="charCount">0</span> / 512 chars</span>
                        <button class="btn-primary" id="btnTranslate">
                            <span class="btn-text-label">Translate</span>
                            <div class="spinner hidden" id="spinner"></div>
                        </button>
                    </div>
                </div>

                <!-- Target Box (English Output) -->
                <div class="box-container target-box">
                    <div class="box-header">
                        <span class="box-label">Translation Result (English)</span>
                        <button class="btn-icon" id="btnCopy" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <span class="tooltip" id="copyTooltip">Copied!</span>
                        </button>
                    </div>
                    <div class="text-output" id="tgtOutput">
                        <span class="placeholder-text">Translation will appear here...</span>
                    </div>
                    <div class="box-footer">
                        <span class="latency-pill hidden" id="latencyPill">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 16 14"></polyline>
                            </svg>
                            <span id="latencyVal">0 ms</span>
                        </span>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer -->

    </div>

    <!-- JS script -->
    <script src="/static/script.js?v=2.0"></script>
</body>

</html>
